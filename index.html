<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>실시간 STT 자막</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <div>
          <div class="eyebrow-row">
            <p class="eyebrow">Browser speech-to-text</p>
            <p class="deployment-info" aria-label="배포 기준 시각">
              <span aria-hidden="true">✦</span>
              <time datetime="2026-06-13T14:49:00+09:00">2026-06-13 14:49 KST</time>
            </p>
          </div>
          <h1>실시간 자막</h1>
        </div>
        <p id="status" class="status" aria-live="polite">대기 중</p>
      </header>

      <section class="caption-panel" aria-label="현재 자막">
        <p id="caption" class="caption" aria-live="polite">
          시작 버튼을 누르고 말해보세요.
        </p>
      </section>

      <section class="controls" aria-label="자막 제어">
        <button id="startButton" type="button">시작</button>
        <button id="stopButton" type="button" disabled>중지</button>
      </section>

      <section class="diagnostics-section" aria-labelledby="diagnosticsTitle">
        <h2 id="diagnosticsTitle">입력 및 연결 상태</h2>
        <div class="diagnostics-grid">
          <article class="diagnostic-card">
            <p class="diagnostic-label">기본 입력 추정</p>
            <p id="microphoneName" class="diagnostic-value">확인 전</p>
            <p id="microphoneType" class="diagnostic-detail">종류 확인 전</p>
            <div
              class="level-meter"
              role="meter"
              aria-label="마이크 입력 레벨"
              aria-valuemin="0"
              aria-valuemax="100"
              aria-valuenow="0"
            >
              <span id="levelFill"></span>
            </div>
            <p id="levelText" class="diagnostic-detail">입력 레벨: 대기 중</p>
            <p id="microphoneNote" class="diagnostic-note">
              지원되는 브라우저에서는 확인된 입력을 음성 인식에도 사용합니다.
            </p>
          </article>

          <article class="diagnostic-card">
            <p class="diagnostic-label">자동 복구</p>
            <p id="restartCount" class="diagnostic-value">재연결 0회</p>
            <p id="restartInfo" class="diagnostic-detail">대기 중</p>
            <p class="diagnostic-label diagnostic-label-spaced">마지막 오류</p>
            <p id="lastError" class="diagnostic-detail">없음</p>
          </article>
        </div>
      </section>

      <section class="history-section" aria-labelledby="historyTitle">
        <h2 id="historyTitle">최근 문장</h2>
        <ul id="history" class="history">
          <li class="empty">아직 인식된 문장이 없습니다.</li>
        </ul>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
